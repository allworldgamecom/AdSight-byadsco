name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  SERVICE_NAME: meta-ads-mcp
  IMAGE_NAME: server

permissions:
  contents: read
  id-token: write   # Required for WIF OIDC token

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  preflight:
    name: Preflight (lint, typecheck, test, build, secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        env:
          CI: '1'
        run: npm test

      - name: Build
        run: npm run build

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml

  deploy:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Validate required production secrets
        env:
          OAUTH_SECRET: ${{ secrets.OAUTH_SECRET }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
          SESSION_COOKIE_SECRET: ${{ secrets.SESSION_COOKIE_SECRET }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          AUTH_ALLOWED_EMAILS: ${{ secrets.AUTH_ALLOWED_EMAILS }}
          AUTH_ALLOWED_DOMAINS: ${{ secrets.AUTH_ALLOWED_DOMAINS }}
          AUTH_ALLOWED_FB_USER_IDS: ${{ secrets.AUTH_ALLOWED_FB_USER_IDS }}
          FIRESTORE_PROJECT_ID: ${{ secrets.FIRESTORE_PROJECT_ID }}
        run: |
          set -u
          errors=()

          # Treat placeholder strings as "not set". `-z` alone misses these
          # because GitHub will happily store "-" or "TODO" as a secret value
          # and the runtime then crashes deep in the container instead of
          # failing the deploy gate.
          looks_unset() {
            local v="$1"
            [ -z "$v" ] && return 0
            case "$v" in
              -|--|x|xx|xxx|TODO|todo|none|None|NONE|placeholder|PLACEHOLDER) return 0 ;;
              "change-me"|"change_me"|"changeme"|"<value>"|"<unset>") return 0 ;;
              your_*|your-*|YOUR_*) return 0 ;;
            esac
            [ "${#v}" -lt 8 ] && return 0
            return 1
          }

          require_present() {
            local name="$1" value="$2"
            if looks_unset "$value"; then
              errors+=("$name is missing or looks like a placeholder")
            fi
          }

          require_min_length() {
            local name="$1" value="$2" min="$3"
            if [ "${#value}" -lt "$min" ]; then
              errors+=("$name must be at least ${min} characters (got ${#value})")
            fi
          }

          require_regex() {
            local name="$1" value="$2" regex="$3" desc="$4"
            if ! printf '%s' "$value" | grep -Eq "$regex"; then
              errors+=("$name must be ${desc}")
            fi
          }

          require_present OAUTH_SECRET            "${OAUTH_SECRET}"
          require_present TOKEN_ENCRYPTION_KEY    "${TOKEN_ENCRYPTION_KEY}"
          require_present SESSION_COOKIE_SECRET   "${SESSION_COOKIE_SECRET}"
          require_present META_APP_ID             "${META_APP_ID}"
          require_present META_APP_SECRET         "${META_APP_SECRET}"
          require_present FIRESTORE_PROJECT_ID    "${FIRESTORE_PROJECT_ID}"

          # Format: matches resolveSecurityConfig() in src/transport/security-config.ts
          require_regex   TOKEN_ENCRYPTION_KEY    "${TOKEN_ENCRYPTION_KEY}"  '^[0-9a-fA-F]{64}$' "64 hex chars (32 bytes)"
          require_min_length SESSION_COOKIE_SECRET "${SESSION_COOKIE_SECRET}" 32
          require_min_length OAUTH_SECRET         "${OAUTH_SECRET}"          32
          # Meta App ID is a numeric string (typ. 15-17 digits)
          require_regex   META_APP_ID             "${META_APP_ID}"           '^[0-9]{10,20}$' "10-20 digit numeric Meta App ID"
          # Meta App Secret is a 32-char hex string
          require_regex   META_APP_SECRET         "${META_APP_SECRET}"       '^[0-9a-fA-F]{32}$' "32 hex chars"
          # GCP project ID format: 6-30 chars, lowercase, starts with letter, ends with letter/digit
          require_regex   FIRESTORE_PROJECT_ID    "${FIRESTORE_PROJECT_ID}"  '^[a-z][a-z0-9-]{4,28}[a-z0-9]$' "valid GCP project ID"

          # At least one allowlist source must be a real value
          allowlist_ok=0
          for v in "${AUTH_ALLOWED_EMAILS}" "${AUTH_ALLOWED_DOMAINS}" "${AUTH_ALLOWED_FB_USER_IDS}"; do
            if ! looks_unset "$v"; then allowlist_ok=1; fi
          done
          if [ "$allowlist_ok" -eq 0 ]; then
            errors+=("at least one of AUTH_ALLOWED_EMAILS / AUTH_ALLOWED_DOMAINS / AUTH_ALLOWED_FB_USER_IDS must hold a real value")
          fi

          if [ "${#errors[@]}" -ne 0 ]; then
            echo "Production secret validation failed:"
            printf '  - %s\n' "${errors[@]}"
            exit 1
          fi
          echo "All production secrets validated."

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f  # v2

      - name: Configure Docker for Artifact Registry
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/meta-ads-mcp/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/meta-ads-mcp/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@251330ba9a8a34bfbc1622895f42e1d53fd14522  # v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/meta-ads-mcp/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --timeout=300
            --min-instances=0
            --max-instances=10
            --port=3000
          env_vars: |
            META_API_VERSION=v22.0
            LOG_LEVEL=info
            NODE_ENV=production
            OAUTH_SECRET=${{ secrets.OAUTH_SECRET }}
            TOKEN_ENCRYPTION_KEY=${{ secrets.TOKEN_ENCRYPTION_KEY }}
            SESSION_COOKIE_SECRET=${{ secrets.SESSION_COOKIE_SECRET }}
            META_APP_ID=${{ secrets.META_APP_ID }}
            META_APP_SECRET=${{ secrets.META_APP_SECRET }}
            AUTH_ALLOWED_EMAILS=${{ secrets.AUTH_ALLOWED_EMAILS }}
            AUTH_ALLOWED_DOMAINS=${{ secrets.AUTH_ALLOWED_DOMAINS }}
            AUTH_ALLOWED_FB_USER_IDS=${{ secrets.AUTH_ALLOWED_FB_USER_IDS }}
            FIRESTORE_PROJECT_ID=${{ secrets.FIRESTORE_PROJECT_ID }}
            META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
            MCP_API_KEY=${{ secrets.MCP_API_KEY }}

      - name: Mask service URL in logs
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
        run: |
          # Register the URL (and its bare host) as secrets so any subsequent
          # step that accidentally prints it gets auto-redacted by Actions.
          echo "::add-mask::${SERVICE_URL}"
          HOST="${SERVICE_URL#https://}"
          HOST="${HOST#http://}"
          echo "::add-mask::${HOST}"

      - name: Set SERVER_URL and META_TOKENS
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
          META_TOKENS: ${{ secrets.META_TOKENS }}
        run: |
          UPDATE_VARS="SERVER_URL=$SERVICE_URL"
          if [ -n "$META_TOKENS" ]; then
            UPDATE_VARS="$UPDATE_VARS||META_TOKENS=$META_TOKENS"
          fi
          gcloud run services update "$SERVICE_NAME" \
            --region="$GCP_REGION" \
            --update-env-vars="^||^$UPDATE_VARS" \
            --quiet > /dev/null 2>&1 || {
              echo "Failed to update SERVER_URL / META_TOKENS env vars"
              exit 1
            }

      - name: Smoke test (URL stays masked in logs)
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
        run: |
          # Wait for new revision to roll out
          sleep 5

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/health" --max-time 10)
          if [ "${STATUS}" = "200" ]; then
            echo "Health check passed (HTTP ${STATUS})"
          else
            echo "Health check FAILED (HTTP ${STATUS})"
            exit 1
          fi

          OAUTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/.well-known/oauth-authorization-server" --max-time 10)
          if [ "${OAUTH_STATUS}" = "200" ]; then
            echo "OAuth metadata check passed (HTTP ${OAUTH_STATUS})"
          else
            echo "OAuth metadata check FAILED (HTTP ${OAUTH_STATUS})"
            exit 1
          fi
