name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  SERVICE_NAME: meta-ads-mcp
  IMAGE_NAME: server

permissions:
  contents: read
  id-token: write   # Required for WIF OIDC token

jobs:
  preflight:
    name: Preflight (lint, typecheck, test, build, secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        env:
          CI: '1'
        run: npm test

      - name: Build
        run: npm run build

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml

  deploy:
    needs: preflight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required production secrets
        env:
          OAUTH_SECRET: ${{ secrets.OAUTH_SECRET }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
          SESSION_COOKIE_SECRET: ${{ secrets.SESSION_COOKIE_SECRET }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          AUTH_ALLOWED_EMAILS: ${{ secrets.AUTH_ALLOWED_EMAILS }}
          AUTH_ALLOWED_DOMAINS: ${{ secrets.AUTH_ALLOWED_DOMAINS }}
          AUTH_ALLOWED_FB_USER_IDS: ${{ secrets.AUTH_ALLOWED_FB_USER_IDS }}
        run: |
          missing=()
          [ -z "${OAUTH_SECRET}" ]           && missing+=("OAUTH_SECRET")
          [ -z "${TOKEN_ENCRYPTION_KEY}" ]   && missing+=("TOKEN_ENCRYPTION_KEY")
          [ -z "${SESSION_COOKIE_SECRET}" ]  && missing+=("SESSION_COOKIE_SECRET")
          [ -z "${META_APP_ID}" ]            && missing+=("META_APP_ID")
          [ -z "${META_APP_SECRET}" ]        && missing+=("META_APP_SECRET")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi
          if [ -z "${AUTH_ALLOWED_EMAILS}" ] \
             && [ -z "${AUTH_ALLOWED_DOMAINS}" ] \
             && [ -z "${AUTH_ALLOWED_FB_USER_IDS}" ]; then
            echo "At least one of AUTH_ALLOWED_EMAILS / AUTH_ALLOWED_DOMAINS / AUTH_ALLOWED_FB_USER_IDS must be set"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/meta-ads-mcp/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/meta-ads-mcp/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/meta-ads-mcp/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --timeout=300
            --min-instances=0
            --max-instances=10
            --port=3000
          env_vars: |
            META_API_VERSION=v22.0
            LOG_LEVEL=info
            NODE_ENV=production
            OAUTH_SECRET=${{ secrets.OAUTH_SECRET }}
            TOKEN_ENCRYPTION_KEY=${{ secrets.TOKEN_ENCRYPTION_KEY }}
            SESSION_COOKIE_SECRET=${{ secrets.SESSION_COOKIE_SECRET }}
            META_APP_ID=${{ secrets.META_APP_ID }}
            META_APP_SECRET=${{ secrets.META_APP_SECRET }}
            AUTH_ALLOWED_EMAILS=${{ secrets.AUTH_ALLOWED_EMAILS }}
            AUTH_ALLOWED_DOMAINS=${{ secrets.AUTH_ALLOWED_DOMAINS }}
            AUTH_ALLOWED_FB_USER_IDS=${{ secrets.AUTH_ALLOWED_FB_USER_IDS }}
            FIRESTORE_PROJECT_ID=${{ secrets.FIRESTORE_PROJECT_ID }}
            META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
            MCP_API_KEY=${{ secrets.MCP_API_KEY }}

      - name: Mask service URL in logs
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
        run: |
          # Register the URL (and its bare host) as secrets so any subsequent
          # step that accidentally prints it gets auto-redacted by Actions.
          echo "::add-mask::${SERVICE_URL}"
          HOST="${SERVICE_URL#https://}"
          HOST="${HOST#http://}"
          echo "::add-mask::${HOST}"

      - name: Set SERVER_URL and META_TOKENS
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
          META_TOKENS: ${{ secrets.META_TOKENS }}
        run: |
          UPDATE_VARS="SERVER_URL=$SERVICE_URL"
          if [ -n "$META_TOKENS" ]; then
            UPDATE_VARS="$UPDATE_VARS||META_TOKENS=$META_TOKENS"
          fi
          gcloud run services update "$SERVICE_NAME" \
            --region="$GCP_REGION" \
            --update-env-vars="^||^$UPDATE_VARS" \
            --quiet > /dev/null 2>&1 || {
              echo "Failed to update SERVER_URL / META_TOKENS env vars"
              exit 1
            }

      - name: Smoke test (URL stays masked in logs)
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
        run: |
          # Wait for new revision to roll out
          sleep 5

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/health" --max-time 10)
          if [ "${STATUS}" = "200" ]; then
            echo "Health check passed (HTTP ${STATUS})"
          else
            echo "Health check FAILED (HTTP ${STATUS})"
            exit 1
          fi

          OAUTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/.well-known/oauth-authorization-server" --max-time 10)
          if [ "${OAUTH_STATUS}" = "200" ]; then
            echo "OAuth metadata check passed (HTTP ${OAUTH_STATUS})"
          else
            echo "OAuth metadata check FAILED (HTTP ${OAUTH_STATUS})"
            exit 1
          fi
